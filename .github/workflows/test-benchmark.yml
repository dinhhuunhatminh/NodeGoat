name: Benchmark Semgrep và Trivy

on:
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  benchmark_tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Benchmark Njsscan (SAST - Nhanh)
      - name: Njsscan Check
        run: |
          pip install njsscan
          time njsscan . --sarif -o results.sarif || true

      # 2. Benchmark Snyk (SCA - Chi tiết)
      - name: Snyk Check
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # 3. Benchmark Trivy (SCA - Toàn diện)
      - name: Trivy Check
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'

      # 4. Benchmark SonarCloud (SAST - Sâu)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  benchmark_sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài đặt Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version
          
      - name: Chạy Benchmark Trivy
        run: |
          echo "==== BẮT ĐẦU QUÉT SCA (TRIVY) ===="
          START_TIME=$(date +%s)
          # Xóa dấu ./ đi, chỉ gọi trivy thôi
          trivy fs --format json --output sca-report.json . || true
          END_TIME=$(date +%s)
          echo "Thời gian quét (giây): $((END_TIME - START_TIME))"
          echo "Số lỗi tìm thấy: $(jq '[.Results[]?.Vulnerabilities | length] | add // 0' sca-report.json)"
          echo "==================================="