name: Benchmark Semgrep và Trivy

on:
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  benchmark_sast:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Cài đặt Semgrep
        run: pip install semgrep
        
      - name: Chạy Benchmark Semgrep
        run: |
          echo "==== BẮT ĐẦU QUÉT SAST (SEMGREP) ===="
          START_TIME=$(date +%s)
          # Thêm cờ --exclude node_modules để bỏ qua thư viện bên thứ 3
          semgrep scan --config auto --exclude "node_modules" --json -o sast-report.json || true
          END_TIME=$(date +%s)
          echo "Thời gian quét (giây): $((END_TIME - START_TIME))"
          echo "Số lỗi tìm thấy: $(jq '.results | length' sast-report.json)"
          echo "======================================="

  benchmark_sca:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        
      - name: Cài đặt Trivy (Bản tải trực tiếp siêu chuẩn)
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.48.3/trivy_0.48.3_Linux-64bit.tar.gz
          tar zxvf trivy_0.48.3_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          
      - name: Chạy Benchmark Trivy
        run: |
          echo "==== BẮT ĐẦU QUÉT SCA (TRIVY) ===="
          START_TIME=$(date +%s)
          trivy fs --format json --output sca-report.json . || true
          END_TIME=$(date +%s)
          echo "Thời gian quét (giây): $((END_TIME - START_TIME))"
          echo "Số lỗi tìm thấy: $(jq '[.Results[]?.Vulnerabilities | length] | add // 0' sca-report.json)"
          echo "==================================="